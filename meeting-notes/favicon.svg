<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Notepad body -->
  <rect x="8" y="6" width="16" height="20" rx="2" fill="white" opacity="0.95"/>
  <!-- Lines representing text -->
  <rect x="11" y="11" width="10" height="1.6" rx="0.8" fill="#3b82f6" opacity="0.7"/>
  <rect x="11" y="15" width="8" height="1.6" rx="0.8" fill="#3b82f6" opacity="0.5"/>
  <rect x="11" y="19" width="10" height="1.6" rx="0.8" fill="#3b82f6" opacity="0.35"/>
  <!-- Pen/pencil icon -->
  <g transform="translate(19, 4) rotate(30)">
    <rect x="0" y="0" width="3" height="10" rx="1" fill="#f59e0b"/>
    <polygon points="0,10 1.5,13 3,10" fill="#374151"/>
  </g>
</svg>
