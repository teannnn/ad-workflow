<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广告商业化工作流</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            color: #fff;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.15);
        }

        .header p {
            font-size: 1.15em;
            opacity: 0.9;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .project-card {
            background: #fff;
            border-radius: 16px;
            padding: 32px 28px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 16px 16px 0 0;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 36px rgba(0,0,0,0.18);
        }

        .project-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .project-card h3 {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #1a1a2e;
        }

        .project-card p {
            font-size: 0.95em;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .project-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .tag-active {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .tag-coming {
            background: #fff3e0;
            color: #ef6c00;
        }

        /* meeting-notes 专属配色 */
        .icon-meeting {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        /* 占位卡片样式 */
        .project-card.coming-soon {
            opacity: 0.7;
            cursor: default;
        }

        .project-card.coming-soon:hover {
            transform: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .project-card.coming-soon::before {
            background: linear-gradient(90deg, #bbb, #ddd);
        }

        .icon-placeholder {
            background: #eee;
            color: #aaa;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>广告商业化工作流</h1>
            <p>团队效率工具集 · Ad Workflow Toolkit</p>
        </div>

        <div class="projects-grid">
            <!-- 会议纪要 -->
            <a href="meeting-notes/" class="project-card">
                <div class="project-icon icon-meeting">📋</div>
                <h3>会议纪要撰写指南</h3>
                <p>基于实战经验提炼的会议纪要方法论，支持输入纪要获取智能改进建议。</p>
                <span class="project-tag tag-active">已上线</span>
            </a>

            <!-- 更多项目占位 -->
            <div class="project-card coming-soon">
                <div class="project-icon icon-placeholder">✨</div>
                <h3>更多工具即将上线</h3>
                <p>数据分析模板、周报生成器、竞品追踪看板……敬请期待。</p>
                <span class="project-tag tag-coming">规划中</span>
            </div>
        </div>

        <div class="footer">
            <p>Ad Workflow · 让商业化工作更高效</p>
        </div>
    </div>
</body>
</html>
